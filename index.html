<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>StyleSpace</title>

  <!--
    Typography — Apple HIG.
    Latin: -apple-system / BlinkMacSystemFont resolves to SF Pro Display +
    SF Pro Text on Apple devices, with Inter as fallback elsewhere.
    Thai:  Noto Sans Thai — Google's pan-script humanist sans, matched in
    x-height and weight to Latin sans-serifs. Loaded with unicode-range
    so it only renders Thai characters; Latin still uses SF Pro / Inter.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">

  <!-- Theme boot — set data-theme synchronously before paint to avoid FOUC.
       Reads localStorage first, falls back to OS preference. -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('stylespace-theme');
        var theme = saved || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <div class="floating-actions">
    <button id="theme-btn" class="theme-toggle" aria-label="Toggle theme"></button>
    <button id="lang-btn" class="lang-toggle" aria-label="Toggle language">EN</button>
  </div>

  <!--
    Header
    Apple-style large-title page header with the Large Title and a
    secondary subtitle in muted label color.
  -->
  <header>
    <div class="hero">
      <h1>StyleSpace</h1>
      <p class="tagline">Upload your floor plan. Explore interior styles instantly.</p>
      <button id="home-btn" class="btn-secondary btn-home hidden">Home</button>
    </div>
  </header>

  <main>
    <!--
      ════════════════════════════════════════════════════════════
      Section 1: UPLOAD
      Files-app-style empty state: SF-Symbol-style icon, Title 2,
      caption, and a primary action below.
      ════════════════════════════════════════════════════════════
    -->
    <section id="upload-section">
      <div id="upload-zone">
        <input type="file" id="file-input" accept="image/*" hidden />
        <div class="upload-icon-wrapper">
          <div class="upload-icon-ring" aria-hidden="true"></div>
          <div class="upload-icon" aria-hidden="true">
            <svg viewBox="0 0 36 36" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 23 V8"/>
              <path d="M11.5 14.5 L18 8 L24.5 14.5"/>
              <path d="M7 22 V26 A2 2 0 0 0 9 28 H27 A2 2 0 0 0 29 26 V22"/>
            </svg>
          </div>
        </div>
        <p class="upload-text">Drop your floor plan here</p>
        <p class="upload-subtext">or click to browse · JPG, PNG</p>
      </div>
    </section>

    <!--
      ════════════════════════════════════════════════════════════
      Section 2: LOADING
      A modern AI-app loader: a colorful gradient orb (à la Apple
      Intelligence / Anthropic) with a soft rotating halo, paired
      with a shimmering headline that mimics streaming-text indicators.
      ════════════════════════════════════════════════════════════
    -->
    <section id="loading-section" class="hidden">
      <div class="loading-card">
        <div class="ai-loader" aria-hidden="true">
          <div class="ai-loader-bar"></div>
          <div class="ai-loader-bar"></div>
          <div class="ai-loader-bar"></div>
          <div class="ai-loader-bar"></div>
        </div>
        <p class="loading-text" id="loading-text">Analyzing your floor plan...</p>
        <p class="loading-subtext" id="loading-subtext">Identifying rooms and layout</p>
      </div>
    </section>

    <!--
      ════════════════════════════════════════════════════════════
      Section 3: ERROR
      ════════════════════════════════════════════════════════════
    -->
    <section id="error-section" class="hidden">
      <div class="error-card">
        <div class="error-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 7v6"/>
            <circle cx="12" cy="16.5" r="0.6" fill="currentColor"/>
          </svg>
        </div>
        <p class="error-text" id="error-message"></p>
        <button id="retry-btn" class="btn-primary">Try Again</button>
      </div>
    </section>

    <!--
      ════════════════════════════════════════════════════════════
      Section 4: QUIZ
      Settings-app-style grouped list. Large title at top,
      thin progress bar, then a single rounded container holding
      the option rows separated by hairlines.
      ════════════════════════════════════════════════════════════
    -->
    <section id="quiz-section" class="hidden">
      <div class="quiz-container">
        <div class="quiz-progress">
          <div class="quiz-progress-bar" id="quiz-progress-bar"></div>
        </div>
        <p class="quiz-step" id="quiz-step"></p>
        <h2 class="quiz-question" id="quiz-question"></h2>
        <div class="quiz-options" id="quiz-options">
          <!-- Quiz option buttons are injected here by main.ts -->
        </div>
        <div class="quiz-skip-actions">
          <button id="random-style-btn" class="btn-text">Random style</button>
          <span class="quiz-skip-sep" aria-hidden="true">·</span>
          <button id="skip-quiz-btn" class="btn-text">Browse all styles</button>
        </div>
      </div>
    </section>

    <!--
      ════════════════════════════════════════════════════════════
      Section 5: STYLE PICKER
      Photos-app-style grid. Header has a Large Title with toolbar
      actions to the right. Cards have rounded thumbnails and
      label/caption text below in iOS Headline + Subhead sizes.
      ════════════════════════════════════════════════════════════
    -->
    <section id="styles-section" class="hidden">
      <div class="styles-header">
        <div>
          <h2>Choose a Style</h2>
          <p class="room-summary" id="room-summary"></p>
        </div>
        <div class="styles-header-actions">
          <button id="download-all-btn" class="btn-secondary hidden">Download All</button>
          <button id="random-style-picker-btn" class="btn-secondary">Random Style</button>
          <button id="retake-quiz-btn" class="btn-secondary">Retake Quiz</button>
          <button id="new-upload-btn" class="btn-secondary">Upload New Image</button>
        </div>
      </div>
      <div class="style-grid" id="style-grid">
        <!-- Style cards are injected here by main.ts -->
      </div>
    </section>

    <!--
      ════════════════════════════════════════════════════════════
      Section 6: RESULT
      ════════════════════════════════════════════════════════════
    -->
    <section id="result-section" class="hidden">
      <div class="result-header">
        <div>
          <h2 id="result-style-name"></h2>
          <p class="result-style-desc" id="result-style-desc"></p>
        </div>
        <div class="result-actions">
          <button id="download-btn" class="btn-secondary">Download</button>
          <button id="regenerate-btn" class="btn-secondary">Regenerate</button>
          <button id="try-another-style-btn" class="btn-primary">Try Another Style</button>
        </div>
      </div>
      <div class="render-container">
        <img id="render-image" src="" alt="AI Render" />
      </div>
    </section>
  </main>

  <footer>
    <p>Bangkok University × SCG · Senior Project · 2026</p>
  </footer>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
